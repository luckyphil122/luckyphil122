# Zensical config — OpenAfterHours after-hours dispatch
# Docs: https://zensical.org/docs/

[project]

site_name = "OpenAfterHours · After-hours dispatch"
site_description = "A personal dispatch from the maintainer of OpenAfterHours — open-source regulatory tools for the financial industry, built after hours."
site_author = "The Maintainer"
site_url = "https://luckyphil122.github.io/"

copyright = """
&copy; 2026 · <b>OpenAfterHours</b>
"""

# Stylesheets are layered on top of Zensical's defaults.
# Paths are relative to docs_dir.
extra_css = [
  "stylesheets/colors_and_type.css",
  "stylesheets/page.css",
]

# Explicit nav — keeps the homepage clean and groups dispatches.
nav = [
  { "Dispatch" = "index.md" },
  { "Dispatches" = "dispatches/index.md" },
]

[project.theme]

# Custom templates live in ./overrides — used by index.md (dispatch.html)
# and individual dispatches (post.html).
custom_dir = "overrides"

favicon = "images/openafterhours_icon_512.png"
language = "en"

# Trim Zensical's stock features for a personal site — keep search,
# instant nav, and code copy; drop announcement bar, breadcrumbs, etc.
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.top",
  "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Light scheme matches the editorial cream background; slate matches OAH dark.
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Sensible Markdown extensions for dispatch posts.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tilde]
